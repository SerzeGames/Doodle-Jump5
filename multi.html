<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Doodle Jump - Multijoueur</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
.wrap{position:relative;width:min(420px,100vw);height:min(720px,100vh);overflow:hidden;box-shadow:0 0 60px rgba(0,200,255,.15)}
canvas{display:block;width:100%;height:100%;image-rendering:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:10;opacity:1;transition:opacity .4s}
.overlay.hidden{opacity:0;pointer-events:none}
#resultScreen{transition:transform 0.8s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;transform:translateY(100%);opacity:1}
#resultScreen.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
#resultScreen.visible{transform:translateY(0);opacity:1;pointer-events:auto}
.overlay h1{font-size:28px;color:#7fff7f;text-shadow:0 0 20px rgba(0,255,100,.4);margin-bottom:6px;letter-spacing:1px}
.overlay .sub{color:#cde;font-size:14px;margin-bottom:18px;opacity:.8}
.btn{background:linear-gradient(135deg,#00c853,#00e676);color:#1a1a2e;border:none;padding:12px 32px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(0,200,100,.3)}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(0,200,100,.5)}
.btn:active{transform:scale(.97)}
.btn.blue{background:linear-gradient(135deg,#42a5f5,#1e88e5);box-shadow:0 4px 20px rgba(0,100,200,.3)}
.btn.red{background:linear-gradient(135deg,#ef5350,#e53935);box-shadow:0 4px 20px rgba(200,50,50,.3)}
.hud-bar{position:absolute;top:0;left:0;right:0;z-index:5;pointer-events:none;height:38px;background:linear-gradient(180deg,#a8c8e8 0%,#7eb3d8 60%,#5a9bc5 100%);border-bottom:2px solid #4a7a9a;display:flex;align-items:center;justify-content:center;padding:0 12px}
.hud-score{font-family:'Comic Sans MS','Segoe UI',sans-serif;font-size:22px;font-weight:900;color:#1a1a2e;text-align:center}
.hud-left-info{position:absolute;left:8px;top:0;height:38px;display:flex;align-items:center;font-size:11px;font-weight:700;color:#1a1a2e;font-family:'Comic Sans MS','Segoe UI',sans-serif}
.hud-right-info{position:absolute;right:8px;top:0;height:38px;display:flex;align-items:center;font-size:11px;font-weight:700;color:#1a1a2e;font-family:'Comic Sans MS','Segoe UI',sans-serif}
.controls-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:11px;z-index:5;pointer-events:none}
input[type=text]{padding:10px 16px;border:2px solid #555;border-radius:20px;font-size:16px;text-align:center;background:rgba(255,255,255,.1);color:#fff;outline:none;width:220px;margin-bottom:8px}
input[type=text]::placeholder{color:rgba(255,255,255,.4)}
.lobby-status{color:#7fe;font-size:14px;margin:10px 0;min-height:20px}
.back-btn{position:absolute;top:12px;left:12px;z-index:20;background:rgba(0,0,0,.4);color:#fff;border:none;padding:6px 14px;border-radius:15px;font-size:13px;cursor:pointer}
/* Result screen styles */
.result-title{font-size:36px;font-weight:900;margin-bottom:20px;text-shadow:0 0 20px rgba(0,0,0,.3);text-align:center;width:100%;padding:0 20px}
.result-title.win{color:#4caf50}
.result-title.lose{color:#ef5350}
.result-scores{display:flex;align-items:center;justify-content:center;gap:20px;margin:16px 0}
.result-player{display:flex;flex-direction:column;align-items:center;gap:4px}
.result-player img{width:50px;height:50px}
.result-player .name{color:#fff;font-size:13px;font-weight:600}
.result-player .pts{color:#cde;font-size:22px;font-weight:900}
.result-vs{color:#fff;font-size:28px;font-weight:900}
</style>
</head>
<body>
<div class="wrap">
<canvas id="c"></canvas>
<div class="hud-bar">
  <div class="hud-left-info" id="hudLeft"></div>
  <div class="hud-score" id="hud">0</div>
  <div class="hud-right-info" id="hudRight"></div>
</div>
<div class="controls-hint">← → ou A/D · Clic pour tirer</div>

<!-- Lobby screen -->
<div class="overlay" id="lobbyScreen">
<h1>Multijoueur</h1>
<div class="sub">Affronte un autre joueur en ligne !</div>
<input type="text" id="pseudoInput" placeholder="Ton pseudo..." maxlength="16"/>
<button class="btn" id="btnSearch">Recherche rapide</button>
<div class="lobby-status" id="lobbyStatus"></div>
<button class="btn blue" style="font-size:13px;padding:8px 20px;margin-top:8px" onclick="location.href='index.html'">← Menu</button>
</div>

<!-- Waiting / GetReady / Go overlays (image based) -->
<div class="overlay hidden" id="waitingScreen" style="background:rgba(0,0,0,.7)">
<img src="images/Waiting.webp" style="width:80%;max-width:350px" alt="Waiting"/>
</div>
<div class="overlay hidden" id="getReadyScreen" style="background:rgba(0,0,0,.7)">
<img src="images/GetReady.webp" style="width:80%;max-width:350px" alt="Get Ready"/>
</div>
<div class="overlay hidden" id="goScreen" style="background:transparent;backdrop-filter:none">
<img src="images/Go.webp" style="width:60%;max-width:250px" alt="Go!"/>
</div>

<!-- Result screen -->
<div class="overlay hidden" id="resultScreen">
<div class="result-title" id="resultTitle">Vous gagnez !</div>
<div class="result-scores">
  <div class="result-player">
    <img src="images/Doodler_transparent.png" alt="Vous"/>
    <div class="name" id="resultMyName">Moi</div>
    <div class="pts" id="resultMyScore">0</div>
  </div>
  <div class="result-vs">:</div>
  <div class="result-player">
    <img src="images/Doodler_transparent.png" alt="Adversaire"/>
    <div class="name" id="resultOpName">Adversaire</div>
    <div class="pts" id="resultOpScore">0</div>
  </div>
</div>
<button class="btn" id="btnPlayAgain" style="margin-top:16px">Continuer</button>
<button class="btn blue" id="btnBackMenu" style="margin-top:8px;font-size:13px;padding:8px 20px">Menu</button>
</div>

</div>

<script>
// ══════════════════════════════════════════
// ASSETS
// ══════════════════════════════════════════
const CHAR_SRC = "images/Doodler_transparent.png";
const BG_SRC = "images/Background.png";
const SND_JUMP = "son/jump.wav";
const MONSTER_SRC = "images/Monster4.png";
const SND_MONSTER = "son/soundmonsters.mp3";
const SND_DEATH = "son/death.mp3";
const SHOOT_SPRITE_SRC = "images/shoot.png";
const SND_SHOOT1 = "son/shoot1.mp3";
const SND_SHOOT2 = "son/shoot2.mp3";
const SND_TRAP = "son/trap.mp3";
const SND_TRAMPOLINE = "son/trampoline.mp3";
const HOLE_SRC = "images/hole.png";
const SND_HOLE = "son/hole.mp3";
const SND_WIN = "son/win.mp3";
const SOUCOUPE_SRC = "images/soucoupe.png";
const SND_SOUCOUPE = "son/soucoupe.mp3";
const SND_MONSTER_DEAD = "son/MonsterDeadByShot.mp3";
const SND_START = "son/start.wav";

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const hudRight = document.getElementById('hudRight');
const hudLeft = document.getElementById('hudLeft');
const lobbyScreen = document.getElementById('lobbyScreen');
const waitingScreen = document.getElementById('waitingScreen');
const getReadyScreen = document.getElementById('getReadyScreen');
const goScreen = document.getElementById('goScreen');
const resultScreen = document.getElementById('resultScreen');

const W = 420, H = 720;
canvas.width = W; canvas.height = H;

// ══════════════════════════════════════════
// LOAD IMAGES
// ══════════════════════════════════════════
const playerImg = new Image(); playerImg.src = CHAR_SRC;
const monsterImg = new Image(); monsterImg.src = MONSTER_SRC;
const shootImg = new Image(); shootImg.src = SHOOT_SPRITE_SRC;
const bgImg = new Image(); bgImg.src = BG_SRC;
const greenPlatImg = new Image(); greenPlatImg.src = "images/green_platform.png";
const bluePlatImg = new Image(); bluePlatImg.src = "images/blue_platform.png";
const trampolineImg = new Image(); trampolineImg.src = "images/trampoline.png";
const holeImg = new Image(); holeImg.src = HOLE_SRC;
const soucoupeImg = new Image(); soucoupeImg.src = SOUCOUPE_SRC;

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let audioReady = false;
let monsterAudio = null;
function playSound(src, vol) { if(!audioReady) return; try { const a=new Audio(src);a.volume=vol;a.play(); } catch(e){} }
function initAudio() { audioReady = true; }
function playJump() { playSound(SND_JUMP, 0.35); }
function playMonsterSound() { if(!audioReady||monsterAudio) return; try { monsterAudio=new Audio(SND_MONSTER);monsterAudio.volume=0.4;monsterAudio.loop=true;monsterAudio.play(); } catch(e){} }
function stopMonsterSound() { if(monsterAudio){try{monsterAudio.pause();monsterAudio.currentTime=0;}catch(e){} monsterAudio=null;} }
function playShootSound() { playSound(Math.random()<0.5?SND_SHOOT1:SND_SHOOT2, 0.3); }
function playDeathSound() { playSound(SND_DEATH, 0.5); }
function playTrapSound() { playSound(SND_TRAP, 0.6); }
function playTrampolineSound() { playSound(SND_TRAMPOLINE, 0.5); }
function playHoleSound() { playSound(SND_HOLE, 0.6); }
function playWinSound() { playSound(SND_WIN, 0.7); }
function playMonsterDeadSound() { playSound(SND_MONSTER_DEAD, 0.5); }
function playStartSound() { playSound(SND_START, 0.6); }
let soucoupeAudio = null;
function playSoucoupeSound() { if(!audioReady||soucoupeAudio) return; try { soucoupeAudio=new Audio(SND_SOUCOUPE);soucoupeAudio.volume=0.4;soucoupeAudio.loop=true;soucoupeAudio.play(); } catch(e){} }
function stopSoucoupeSound() { if(soucoupeAudio){try{soucoupeAudio.pause();soucoupeAudio.currentTime=0;}catch(e){} soucoupeAudio=null;} }

// ══════════════════════════════════════════
// SEEDED RANDOM (for synchronized world gen)
// ══════════════════════════════════════════
let seedState = 1;
function seedRandom(s) { seedState = s; }
function sRand() {
  seedState = (seedState * 16807 + 0) % 2147483647;
  return (seedState - 1) / 2147483646;
}
function sRandF(a,b) { return sRand()*(b-a)+a; }
function sRandI(a,b) { return Math.floor(sRandF(a,b+1)); }
// Non-seeded for local-only things (particles, etc.)
function rand(a,b){ return Math.random()*(b-a)+a; }
function randI(a,b){ return Math.floor(rand(a,b+1)); }

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const GRAVITY = 0.42;
const JUMP_VEL = -12.5;
const SUPER_JUMP = -19.5;
const MOVE_SPEED = 5.5;
const SCROLL_LINE = H * 0.38;
const PLAT_COUNT = 14;
const PLAT_W_MIN = 58, PLAT_W_MAX = 95;
const PLAT_H = 14;
const GAP_MIN = 38, GAP_MAX = 85;
const PLAYER_W = 66, PLAYER_H = 66;
const MONSTER_W = 85, MONSTER_H = 50;
const MONSTER_START_SCORE = 1000;
const MONSTER_INTERVAL_MAX = 800;
const MONSTER_INTERVAL_MIN = 250;
const MONSTER_RAMP_SCORE = 8000;
const HOLE_W = 55, HOLE_H = 55;
const SOUCOUPE_W = 80, SOUCOUPE_H = 50;
const SOUCOUPE_RANGE = 150; // distance d'aspiration
const TRAMPOLINE_INTERVAL_MIN = 1200;
const TRAMPOLINE_INTERVAL_MAX = 1800;
const TRAMPOLINE_JUMP = -22;
const FINISH_LINE_SCORE = 5000;
const MAX_POINTS = 5; // premier à 5 points gagne la partie
const PT = { NORMAL:0, MOVING:1, FRAGILE:2, SPRING:3 };
const PT_COLORS = {
  [PT.NORMAL]:  { top:'#4caf50', body:'#388e3c', shine:'rgba(255,255,255,.25)' },
  [PT.MOVING]:  { top:'#42a5f5', body:'#1e88e5', shine:'rgba(255,255,255,.2)' },
  [PT.FRAGILE]: { top:'#ef9a9a', body:'#e57373', shine:'rgba(255,255,255,.15)' },
  [PT.SPRING]:  { top:'#ffb74d', body:'#ff9800', shine:'rgba(255,255,255,.25)' },
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let player, platforms, monsters, holes, soucoupes, score, cameraY, running, dead;
let nextMonsterScore, nextTrampolineScore;
let gameTime = 0; // temps global absolu depuis début de manche (en frames normalisées)
let stunned = false, stunnedTime = 0;
let suckedIn = false, suckedInTime = 0, suckedInHole = null;
let beingAbducted = false, abductionShrink = 1; // soucoupe abduction
let projectiles = [], shooting = false, shootTimer = 0;
let opProjectiles = []; // opponent's projectiles displayed on our screen
let backflipAngle = 0, backflipping = false;
let keys = { l:false, r:false };
let particles = [];
let screenShake = 0;
let bgPattern = null;
let lastTs = 0;

// Multiplayer state
let myPseudo = 'Joueur';
let opPseudo = 'Adversaire';
let peer = null, conn = null;
let isHost = false;
let gameSeed = 0;
let opponentData = { x: W/2, y: H-140, w: PLAYER_W, h: PLAYER_H, facing:1, squash:1, score:0, cameraY:0, dead:false, shooting:false, backflipping:false, backflipAngle:0, stunned:false, stunnedTime:0, suckedIn:false, pts:0 };
let matchActive = false;
let opponentDead = false;
let myDead = false;
let myPoints = 0, opPoints = 0; // points de manches
let finishReached = false;
let meReadyForNext = false, opReadyForNext = false;
let killedEnemies = new Set(); // IDs of enemies killed (persists until spawned on our side)

// Background pattern
bgImg.onload = () => {
  const pc = document.createElement('canvas');
  pc.width = bgImg.naturalWidth; pc.height = bgImg.naturalHeight;
  pc.getContext('2d').drawImage(bgImg, 0, 0);
  bgPattern = ctx.createPattern(pc, 'repeat');
};

// ══════════════════════════════════════════
// PLATFORM GENERATION (seeded)
// ══════════════════════════════════════════
let platCounter = 0; // global counter for deterministic generation

function makePlatSeeded(x, y, type) {
  const w = sRandI(PLAT_W_MIN, PLAT_W_MAX);
  const speed = type===PT.MOVING ? sRandF(1,2.2) : 0;
  const dir = sRand()<0.5 ? -1 : 1;
  return {
    x, y, w, h: PLAT_H, type,
    initX: x, // position initiale pour calcul déterministe
    moveSpeed: speed, moveDir: dir,
    vx: speed * dir,
    broken: false, breakAnim: 0, springAnim: 0, hasTrampoline: false,
  };
}

function generatePlatform(scoreApprox) {
  // Use platCounter-based seed so both players get identical platforms
  seedRandom(gameSeed * 3 + platCounter * 7919);
  platCounter++;
  let highY=Infinity; for(const p of platforms) if(p.y<highY) highY=p.y;
  if(!isFinite(highY)) highY=player.y-50;
  const ny=highY-sRandI(GAP_MIN,GAP_MAX);
  const nx=sRandI(10,W-PLAT_W_MAX-10);
  let type=PT.NORMAL;
  const diff=Math.min(scoreApprox/3000,1);
  const r=sRand();
  if(r<.05+diff*.05) type=PT.SPRING;
  else if(r<.25+diff*.08) type=PT.MOVING;
  const plat = makePlatSeeded(nx,ny,type);
  if(type===PT.NORMAL && sRand() < 0.07) plat.hasTrampoline = true;

  // Every ~8 platforms after score threshold, spawn an enemy at the same Y level
  if(platCounter > 15 && platCounter % 8 === 0) {
    seedRandom(gameSeed * 7 + platCounter * 3571);
    const enemyId = 'e' + platCounter;
    const alreadyDead = killedEnemies.has(enemyId);
    const roll = sRand();
    const ey = ny - sRandI(20, 80);
    if(roll < 0.4) {
      const mx = sRandI(30, W - MONSTER_W - 30);
      monsters.push({ id:enemyId, x:mx, y:ey, w:MONSTER_W, h:MONSTER_H, alive:!alreadyDead, floatT:sRand()*Math.PI*2, kind:'monster' });
    } else if(roll < 0.7) {
      const hx = sRandI(30, W - HOLE_W - 30);
      if(!alreadyDead) holes.push({ id:enemyId, x:hx, y:ey, w:HOLE_W, h:HOLE_H });
    } else {
      const sx = sRandI(30, W - SOUCOUPE_W - 30);
      soucoupes.push({ id:enemyId, x:sx, y:ey, w:SOUCOUPE_W, h:SOUCOUPE_H, alive:!alreadyDead });
    }
  }

  return plat;
}

// generateMonsterOrHole is no longer needed — enemies spawn with platforms

function init() {
  player = { x:W/2-PLAYER_W/2, y:H-140, w:PLAYER_W, h:PLAYER_H, vx:0, vy:0, facing:1, squash:1 };
  platforms=[]; particles=[]; monsters=[]; holes=[]; soucoupes=[]; projectiles=[]; opProjectiles=[];
  score=0; cameraY=0; dead=false; finishReached=false; gameTime=0;
  suckedIn=false; suckedInTime=0; suckedInHole=null;
  beingAbducted=false; abductionShrink=1;
  screenShake=0; nextMonsterScore=MONSTER_START_SCORE;
  stunned=false; stunnedTime=0; shooting=false; shootTimer=0;
  backflipAngle=0; backflipping=false;
  platCounter=0;
  killedEnemies = new Set();
  stopMonsterSound();
  stopSoucoupeSound();

  // Seeded initial platform generation — identical for both players
  seedRandom(gameSeed);
  let cy = H - 50;
  platforms.push(makePlatSeeded(player.x - 20, player.y + player.h + 8, PT.NORMAL));
  platCounter++;
  for(let i=0; i<PLAT_COUNT; i++){
    seedRandom(gameSeed * 3 + platCounter * 7919);
    platCounter++;
    const gap = sRandI(GAP_MIN, GAP_MAX);
    cy -= gap;
    const px = sRandI(10, W - PLAT_W_MAX - 10);
    let type = PT.NORMAL;
    if(i > 2) {
      const r = sRand();
      if(r < .08) type = PT.SPRING;
      else if(r < .30) type = PT.MOVING;
    }
    platforms.push(makePlatSeeded(px, cy, type));
  }
}

// ══════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════
function update(dt) {
  if(dead) return;
  const t = dt / 16.667;
  gameTime += t;

  if(suckedIn) {
    suckedInTime += t;
    const shrinkSpeed = 0.04;
    player.w *= (1 - shrinkSpeed * t);
    player.h *= (1 - shrinkSpeed * t);
    if(suckedInHole) {
      player.x += (suckedInHole.x+suckedInHole.w/2 - player.x-player.w/2)*0.15*t;
      player.y += (suckedInHole.y+suckedInHole.h/2 - player.y-player.h/2)*0.15*t;
    }
    if(player.w < 3 || suckedInTime > 40) { onDeath(); }
    return;
  }

  // Input - Gyroscope OR keyboard/touch
  if(gyroEnabled && isMobile) {
    const deadZone = 2.5, maxTilt = 18;
    let tilt = Math.max(-maxTilt, Math.min(maxTilt, gyroGamma));
    if(Math.abs(tilt) < deadZone) tilt = 0;
    else tilt = (tilt - Math.sign(tilt)*deadZone) / (maxTilt - deadZone);
    tilt = Math.sign(tilt) * Math.pow(Math.abs(tilt), 1.1);
    tilt = Math.max(-1, Math.min(1, tilt));
    const targetVx = tilt * MOVE_SPEED * 1.8;
    player.vx += (targetVx - player.vx) * 0.35;
    if(tilt < -0.2) player.facing = -1;
    else if(tilt > 0.2) player.facing = 1;
  } else {
    if(keys.l) { player.vx = -MOVE_SPEED; player.facing = -1; }
    else if(keys.r) { player.vx = MOVE_SPEED; player.facing = 1; }
    else player.vx *= 0.75;
  }

  player.x += player.vx * t;
  if(player.x + player.w < 0) player.x = W;
  if(player.x > W) player.x = -player.w;

  player.vy += GRAVITY * t;
  player.y += player.vy * t;

  if(player.vy < -2) player.squash = Math.max(0.8, 1 + player.vy * 0.012);
  else if(player.vy > 2) player.squash = Math.min(1.2, 1 + player.vy * 0.008);
  else player.squash += (1 - player.squash) * 0.15;

  if(backflipping) {
    backflipAngle += 0.18 * t;
    if(backflipAngle >= Math.PI * 2) { backflipAngle = 0; backflipping = false; }
  }

  // Scroll
  if(player.y < SCROLL_LINE) {
    const dy = SCROLL_LINE - player.y;
    cameraY += dy;
    player.y = SCROLL_LINE;
    for(const p of platforms) p.y += dy;
    for(const pr of particles) pr.y += dy;
    for(const m of monsters) m.y += dy;
    for(const h of holes) h.y += dy;
    for(const s of soucoupes) s.y += dy;
    for(const pr of projectiles) pr.y += dy;
    score += dy * 0.3;
    hud.textContent = Math.floor(score);

    // Check finish line
    if(!finishReached && score >= FINISH_LINE_SCORE) {
      finishReached = true;
      myPoints++;
      sendData({ type:'win', score: Math.floor(score) });
      playWinSound();
      showResults();
      return;
    }
  }

  // Platform logic (deterministic movement using gameTime)
  for(const p of platforms) {
    if(p.type === PT.MOVING && !p.broken && p.moveSpeed > 0) {
      // Deterministic ping-pong: calculate x from gameTime
      const range = W - 10 - p.w; // total travel range
      const period = range / p.moveSpeed; // frames for one direction
      const phase = (gameTime * p.moveSpeed) % (range * 2);
      if(phase < range) {
        p.x = 5 + phase;
      } else {
        p.x = 5 + range - (phase - range);
      }
    }
    if(p.broken) { p.breakAnim += 0.06*t; p.y += 4*t; }
    if(p.springAnim > 0) p.springAnim -= 0.08*t;
  }

  // Stunned
  if(stunned) {
    stunnedTime += t;
    player.vy += GRAVITY * 0.3 * t;
    if(player.vy > 3) player.vy = 3;
    player.y += player.vy * t;
    if(player.y > H + 80) { playDeathSound(); onDeath(); }
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*t;p.y+=p.vy*t;p.vy+=0.15*t;p.life-=p.decay*t;if(p.life<=0)particles.splice(i,1);}
    if(screenShake>0) screenShake*=0.85;
    return;
  }

  // Landing
  if(player.vy > 0) {
    const feet = player.y + player.h;
    for(const p of platforms) {
      if(p.broken) continue;
      const onX = (player.x+player.w-8 > p.x) && (player.x+8 < p.x+p.w);
      const onY = feet >= p.y && feet <= p.y+p.h+player.vy*t+4;
      if(onX && onY) {
        if(p.type === PT.SPRING) {
          player.vy=SUPER_JUMP; p.springAnim=1;
          spawnParticles(p.x+p.w/2,p.y,'#ffb74d',10); playJump();
        } else {
          if(p.hasTrampoline) {
            player.vy=TRAMPOLINE_JUMP; backflipping=true; backflipAngle=0;
            spawnParticles(p.x+p.w/2,p.y,'#ff5555',12); screenShake=5; playTrampolineSound();
          } else {
            player.vy=JUMP_VEL; spawnParticles(p.x+p.w/2,p.y,'#81c784',5); playJump();
          }
        }
        player.y=p.y-player.h; player.squash=1.25; break;
      }
    }
  }

  // Projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const pr=projectiles[i]; pr.x+=pr.vx*t; pr.y+=pr.vy*t;
    if(pr.y<-20||pr.x<-20||pr.x>W+20){projectiles.splice(i,1);continue;}
    for(let j=monsters.length-1;j>=0;j--){
      const m=monsters[j]; if(!m.alive) continue;
      const monY=m.y+(m.floatY||0);
      if(pr.x+pr.w>m.x&&pr.x<m.x+m.w&&pr.y<monY+m.h&&pr.y+pr.h>monY){
        m.alive=false;killedEnemies.add(m.id);projectiles.splice(i,1);
        spawnParticles(m.x+m.w/2,monY,'#42a5f5',12);screenShake=5;stopMonsterSound();score+=50;hud.textContent=Math.floor(score);
        playMonsterDeadSound();
        sendData({type:'monsterKill', id:m.id});
        sendData({type:'sound', snd:'monsterDead'});
        break;
      }
    }
    // Hit soucoupe
    if(!projectiles[i]) continue; // already spliced
    for(let j=soucoupes.length-1;j>=0;j--){
      const s=soucoupes[j]; if(!s.alive) continue;
      if(pr.x+pr.w>s.x&&pr.x<s.x+s.w&&pr.y<s.y+s.h&&pr.y+pr.h>s.y){
        s.alive=false;killedEnemies.add(s.id);projectiles.splice(i,1);
        spawnParticles(s.x+s.w/2,s.y+s.h/2,'#8bc34a',15);screenShake=6;stopSoucoupeSound();
        // Restore player size if being abducted
        if(beingAbducted){beingAbducted=false;abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;}
        score+=100;hud.textContent=Math.floor(score);
        playMonsterDeadSound();
        sendData({type:'soucoupeKill', id:s.id});
        sendData({type:'sound', snd:'monsterDead'});
        break;
      }
    }
  }
  if(shooting){shootTimer+=t;if(shootTimer>12)shooting=false;}

  // Opponent projectiles update (can kill monsters and soucoupes)
  for(let i=opProjectiles.length-1;i>=0;i--){
    const pr=opProjectiles[i]; pr.x+=pr.vx*t; pr.y+=pr.vy*t;
    if(pr.y<-20||pr.x<-20||pr.x>W+20){opProjectiles.splice(i,1);continue;}
    for(let j=monsters.length-1;j>=0;j--){
      const m=monsters[j]; if(!m.alive) continue;
      const monY=m.y+(m.floatY||0);
      if(pr.x+pr.w>m.x&&pr.x<m.x+m.w&&pr.y<monY+m.h&&pr.y+pr.h>monY){
        m.alive=false;killedEnemies.add(m.id);opProjectiles.splice(i,1);
        spawnParticles(m.x+m.w/2,monY,'#42a5f5',12);screenShake=3;stopMonsterSound();break;
      }
    }
    if(!opProjectiles[i]) continue;
    for(let j=soucoupes.length-1;j>=0;j--){
      const s=soucoupes[j]; if(!s.alive) continue;
      if(pr.x+pr.w>s.x&&pr.x<s.x+s.w&&pr.y<s.y+s.h&&pr.y+pr.h>s.y){
        s.alive=false;killedEnemies.add(s.id);opProjectiles.splice(i,1);
        spawnParticles(s.x+s.w/2,s.y+s.h/2,'#8bc34a',15);screenShake=3;stopSoucoupeSound();
        if(beingAbducted){beingAbducted=false;abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;}
        break;
      }
    }
  }

  // Monsters (deterministic float using gameTime + spawn offset)
  for(let i=monsters.length-1;i>=0;i--){
    const m=monsters[i];
    // Use gameTime + initial floatT offset for deterministic oscillation
    m.floatY=Math.sin(gameTime*0.04 + m.floatT)*8;
    const monY=m.y+(m.floatY||0);
    if(m.y>H+20){monsters.splice(i,1);stopMonsterSound();continue;}
    if(!m.alive) continue;
    const isNear=monY>-300&&monY<H;
    if(isNear) playMonsterSound(); else stopMonsterSound();
    if(player.vy>0){
      const feet=player.y+player.h;
      const onX=player.x+player.w-8>m.x&&player.x+8<m.x+m.w;
      const onY=feet>=monY&&feet<=monY+m.h/2+player.vy*t+5;
      if(onX&&onY){m.alive=false;killedEnemies.add(m.id);player.vy=SUPER_JUMP;player.squash=1.3;spawnParticles(m.x+m.w/2,m.y,'#42a5f5',15);screenShake=8;stopMonsterSound();playJump();sendData({type:'monsterKill',id:m.id});}
    }
    if(m.alive&&!stunned){
      const overlap=player.x+player.w-5>m.x&&player.x+5<m.x+m.w&&player.y+player.h>monY+m.h/3&&player.y<monY+m.h;
      if(overlap){stunned=true;stunnedTime=0;player.vy=-2;stopMonsterSound();playTrapSound();sendData({type:'sound',snd:'trap'});}
    }
  }

  // Holes
  for(let i=holes.length-1;i>=0;i--){
    const h=holes[i]; if(h.y>H+60){holes.splice(i,1);continue;}
    if(!stunned&&!suckedIn){
      const dx=player.x+player.w/2-(h.x+h.w/2),dy=player.y+player.h/2-(h.y+h.h/2);
      if(Math.sqrt(dx*dx+dy*dy)<(h.w/2+player.w/4)){
        suckedIn=true;suckedInTime=0;suckedInHole=h;player.vx=0;player.vy=0;stopMonsterSound();playHoleSound();sendData({type:'sound',snd:'hole'});
      }
    }
  }

  // Soucoupes update & abduction
  let anySoucoupeNear = false;
  for(let i=soucoupes.length-1;i>=0;i--){
    const s=soucoupes[i];
    if(s.y>H+60){soucoupes.splice(i,1);continue;}
    if(!s.alive) continue;
    const scx=s.x+s.w/2, scy=s.y+s.h/2;
    const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
    const isOnScreen=s.y>-s.h&&s.y<H;
    if(isOnScreen) anySoucoupeNear=true;
    // Abduction: if player is below soucoupe and within range
    if(!stunned&&!suckedIn&&isOnScreen && pcy > scy && Math.abs(pcx-scx)<SOUCOUPE_RANGE && (pcy-scy)<SOUCOUPE_RANGE*1.5){
      beingAbducted=true;
      abductionShrink -= 0.008*t;
      player.w = PLAYER_W * Math.max(0.15, abductionShrink);
      player.h = PLAYER_H * Math.max(0.15, abductionShrink);
      // Pull player toward soucoupe center
      player.x += (scx - pcx) * 0.02 * t;
      player.y += (scy - pcy) * 0.015 * t;
      if(abductionShrink <= 0.15) {
        // Abducted — death
        sendData({type:'sound',snd:'death'});
        playDeathSound();
        onDeath();
        return;
      }
    }
  }
  if(anySoucoupeNear) playSoucoupeSound(); else { stopSoucoupeSound(); if(!beingAbducted){abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;} }
  // If no soucoupe nearby and was being abducted, restore
  if(!anySoucoupeNear && beingAbducted){beingAbducted=false;abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;}

  // New platforms (counter-based deterministic generation)
  for(let i=platforms.length-1;i>=0;i--) if(platforms[i].y>H+60) platforms.splice(i,1);
  while(platforms.length < PLAT_COUNT) {
    platforms.push(generatePlatform(score));
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*t;p.y+=p.vy*t;p.vy+=0.15*t;p.life-=p.decay*t;
    if(p.life<=0) particles.splice(i,1);
  }
  if(screenShake>0) screenShake*=0.85;

  // Death by falling
  if(player.y>H+80) { playDeathSound(); onDeath(); }
}

function spawnParticles(x,y,color,count=6){for(let i=0;i<count;i++)particles.push({x,y,vx:rand(-3,3),vy:rand(-4,-1),life:1,decay:rand(.02,.05),size:rand(2,5),color});}

function onDeath() {
  dead = true; running = false; myDead = true;
  sendData({ type:'dead', score: Math.floor(score) });
  sendData({ type:'sound', snd:'death' });
  showResults();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  ctx.save();
  if(screenShake>0.5) ctx.translate(rand(-screenShake,screenShake),rand(-screenShake,screenShake));

  if(bgPattern){ctx.save();ctx.translate(0,(cameraY*0.05)%200);ctx.fillStyle=bgPattern;ctx.fillRect(-200,-200,W+400,H+400);ctx.restore();}
  else{ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W,H);}

  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'rgba(200,230,255,.12)');grd.addColorStop(1,'rgba(255,245,220,.08)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // Finish line — draw at the Y position corresponding to FINISH_LINE_SCORE
  // The finish line is at a fixed world altitude; convert to screen Y
  const finishWorldY = -(FINISH_LINE_SCORE / 0.3); // approximate world Y from score
  const finishScreenY = finishWorldY + cameraY + H; // rough screen mapping
  // Better approach: track it based on cameraY
  const finishY = H - (FINISH_LINE_SCORE / 0.3) + cameraY;
  if(finishY > -20 && finishY < H + 20) {
    ctx.save();
    // Dashed red/white line
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 3;
    ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ctx.moveTo(0, finishY);
    ctx.lineTo(W, finishY);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏁 ARRIVÉE 🏁', W/2, finishY - 8);
    ctx.restore();
  }

  // Platforms
  for(const p of platforms){
    if(p.broken&&p.breakAnim>1) continue;
    ctx.globalAlpha=p.broken?Math.max(0,1-p.breakAnim):1;
    if(p.type===PT.NORMAL&&greenPlatImg.complete&&greenPlatImg.naturalWidth) ctx.drawImage(greenPlatImg,p.x,p.y,p.w,p.h);
    else if(p.type===PT.MOVING&&bluePlatImg.complete&&bluePlatImg.naturalWidth) ctx.drawImage(bluePlatImg,p.x,p.y,p.w,p.h);
    else{const c=PT_COLORS[p.type];ctx.fillStyle='rgba(0,0,0,.08)';roundRect(ctx,p.x+2,p.y+3,p.w,p.h,7);ctx.fill();ctx.fillStyle=c.body;roundRect(ctx,p.x,p.y,p.w,p.h,7);ctx.fill();ctx.fillStyle=c.top;roundRect(ctx,p.x,p.y,p.w,p.h*0.6,7);ctx.fill();ctx.fillStyle=c.shine;ctx.fillRect(p.x+6,p.y+2,p.w-12,2);}
    if(p.type===PT.SPRING){const sy=p.springAnim>0?-8*p.springAnim:0;ctx.fillStyle='#ff5722';ctx.fillRect(p.x+p.w/2-5,p.y-8+sy,10,8);ctx.fillStyle='#ff8a65';ctx.fillRect(p.x+p.w/2-3,p.y-7+sy,6,3);}
    if(p.hasTrampoline&&trampolineImg.complete&&trampolineImg.naturalWidth){ctx.drawImage(trampolineImg,p.x+p.w/2-16,p.y-16,32,16);}
    ctx.globalAlpha=1;
  }

  // Particles
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Projectiles (mine = orange, opponent = blue)
  ctx.fillStyle='#ff5722';
  for(const pr of projectiles){ctx.beginPath();ctx.ellipse(pr.x+pr.w/2,pr.y+pr.h/2,pr.w/2,pr.h/2,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#42a5f5';
  for(const pr of opProjectiles){ctx.beginPath();ctx.ellipse(pr.x+pr.w/2,pr.y+pr.h/2,pr.w/2,pr.h/2,0,0,Math.PI*2);ctx.fill();}

  // Holes
  for(const h of holes){if(holeImg.complete&&holeImg.naturalWidth)ctx.drawImage(holeImg,h.x,h.y,h.w,h.h);else{ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(h.x+h.w/2,h.y+h.h/2,h.w/2,h.h/2,0,0,Math.PI*2);ctx.fill();}}

  // Monsters
  for(const m of monsters){if(!m.alive)continue;const my=m.y+(m.floatY||0);if(monsterImg.complete&&monsterImg.naturalWidth)ctx.drawImage(monsterImg,m.x,my,m.w,m.h);else{ctx.fillStyle='#42a5f5';ctx.fillRect(m.x,my,m.w,m.h);}}

  // Soucoupes
  for(const s of soucoupes){
    if(!s.alive) continue;
    if(soucoupeImg.complete&&soucoupeImg.naturalWidth) ctx.drawImage(soucoupeImg,s.x,s.y,s.w,s.h);
    else{ctx.fillStyle='#556b2f';ctx.fillRect(s.x,s.y,s.w,s.h);}
    // Draw traction beam if player is being abducted by this soucoupe
    if(beingAbducted){
      const scx=s.x+s.w/2,scy=s.y+s.h;
      const pcx=player.x+player.w/2,pcy=player.y;
      if(Math.abs(pcx-scx)<SOUCOUPE_RANGE && pcy>scy){
        ctx.save();
        ctx.globalAlpha=0.15+Math.sin(gameTime*0.2)*0.08;
        ctx.fillStyle='#aeff00';
        ctx.beginPath();
        ctx.moveTo(scx-15,scy);ctx.lineTo(scx+15,scy);
        ctx.lineTo(pcx+20,pcy);ctx.lineTo(pcx-20,pcy);
        ctx.closePath();ctx.fill();
        ctx.restore();
      }
    }
  }

  // Opponent (fully visible, camera-relative)
  if(matchActive && opponentData && !opponentData.dead) {
    const ox = opponentData.x;
    const cameraDiff = opponentData.cameraY - cameraY;
    const drawY = opponentData.y - cameraDiff;
    const drawX = ox;
    const ocx = drawX + PLAYER_W/2;
    const ocy = drawY + PLAYER_H/2;
    const onScreen = drawY > -PLAYER_H && drawY < H + PLAYER_H;

    if(onScreen && playerImg.complete && playerImg.naturalWidth) {
      ctx.save();
      ctx.translate(ocx, ocy);
      if(opponentData.backflipping) ctx.rotate(-opponentData.backflipAngle);
      ctx.scale((opponentData.facing||1) * (2-(opponentData.squash||1)), opponentData.squash||1);
      if(opponentData.shooting && shootImg.complete && shootImg.naturalWidth) {
        const ratio = shootImg.naturalWidth/shootImg.naturalHeight;
        ctx.drawImage(shootImg, -PLAYER_H*ratio/2, -PLAYER_H/2, PLAYER_H*ratio, PLAYER_H);
      } else {
        ctx.drawImage(playerImg, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
      }
      ctx.restore();
      // Opponent pseudo
      ctx.fillStyle = '#42a5f5';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(opPseudo, ocx, drawY - 8);
      // Opponent stunned stars
      if(opponentData.stunned) {
        const ost = opponentData.stunnedTime || 0;
        ctx.save();
        for(let i=0;i<4;i++){const angle=ost*4+(Math.PI*2/4)*i;const sx=ocx+Math.cos(angle)*18,sy=drawY-10+Math.sin(angle)*9;ctx.save();ctx.translate(sx,sy);ctx.rotate(ost*6+i);ctx.fillStyle=i%2===0?'#FFD700':'#FFA500';ctx.beginPath();for(let j=0;j<8;j++){const r2=j%2===0?5:2;const a2=(Math.PI/4)*j-Math.PI/2;if(j===0)ctx.moveTo(Math.cos(a2)*r2,Math.sin(a2)*r2);else ctx.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2);}ctx.closePath();ctx.fill();ctx.restore();}
        ctx.restore();
      }
    } else {
      // Arrow indicator
      ctx.save();
      const arrowX = Math.max(20, Math.min(W - 20, ocx));
      if(drawY <= -PLAYER_H) {
        const arrowY = 36;
        ctx.fillStyle = '#42a5f5';
        ctx.beginPath();
        ctx.moveTo(arrowX, arrowY - 12);
        ctx.lineTo(arrowX - 10, arrowY + 4);
        ctx.lineTo(arrowX + 10, arrowY + 4);
        ctx.closePath();
        ctx.fill();
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(opPseudo, arrowX, arrowY + 18);
      } else {
        const arrowY = H - 20;
        ctx.fillStyle = '#42a5f5';
        ctx.beginPath();
        ctx.moveTo(arrowX, arrowY + 12);
        ctx.lineTo(arrowX - 10, arrowY - 4);
        ctx.lineTo(arrowX + 10, arrowY - 4);
        ctx.closePath();
        ctx.fill();
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(opPseudo, arrowX, arrowY - 10);
      }
      ctx.restore();
    }
  }

  // Local player
  if(playerImg.complete&&playerImg.naturalWidth){
    ctx.save();
    const cx=player.x+player.w/2, cy2=player.y+player.h/2;
    ctx.translate(cx,cy2);
    if(backflipping) ctx.rotate(-backflipAngle);
    ctx.scale(player.facing*(2-player.squash),player.squash);
    const isShoot=shooting&&shootImg.complete&&shootImg.naturalWidth;
    if(isShoot){const ratio=shootImg.naturalWidth/shootImg.naturalHeight;const dH=player.h;const dW=dH*ratio;ctx.drawImage(shootImg,-dW/2,-dH/2,dW,dH);}
    else ctx.drawImage(playerImg,-player.w/2,-player.h/2,player.w,player.h);
    ctx.restore();
    // My pseudo above head
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(myPseudo, cx, player.y - 8);
  } else {ctx.fillStyle='#4caf50';roundRect(ctx,player.x,player.y,player.w,player.h,10);ctx.fill();}

  // Stars when stunned
  if(stunned){
    const starCx=player.x+player.w/2,starCy=player.y-10;
    ctx.save();
    for(let i=0;i<4;i++){const angle=stunnedTime*4+(Math.PI*2/4)*i;const sx=starCx+Math.cos(angle)*18,sy=starCy+Math.sin(angle)*9;ctx.save();ctx.translate(sx,sy);ctx.rotate(stunnedTime*6+i);ctx.fillStyle=i%2===0?'#FFD700':'#FFA500';ctx.beginPath();for(let j=0;j<8;j++){const r=j%2===0?5:2;const a=(Math.PI/4)*j-Math.PI/2;if(j===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();ctx.restore();}
    ctx.restore();
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

// ══════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════
function loop(ts) {
  if(!running && !dead) return;
  if(!lastTs) lastTs = ts;
  const dt = Math.min(ts - lastTs, 33.33);
  lastTs = ts;
  if(running) update(dt);
  render();
  // Send position data to opponent
  if(matchActive && conn && conn.open) {
    sendData({
      type:'pos',
      x: player.x, y: player.y,
      facing: player.facing, squash: player.squash,
      score: Math.floor(score), cameraY: cameraY,
      shooting, backflipping, backflipAngle,
      stunned, stunnedTime, suckedIn, pts: myPoints
    });
  }
  // Update HUD with opponent score
  if(matchActive) {
    hudLeft.textContent = myPoints + ' - ' + opPoints;
    hudRight.textContent = opPseudo + ': ' + Math.floor(opponentData.score);
  }
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════
// NETWORKING (PeerJS) - Robust matchmaking
// ══════════════════════════════════════════
const LOBBY_PREFIX = 'doodlejump3-';
const NUM_ROOMS = 10; // try rooms 0-9

function sendData(data) {
  if(conn && conn.open) { try { conn.send(data); } catch(e){} }
}

let connected = false;

function onData(data) {
  if(data.type === 'pos') {
    opponentData.x = data.x;
    opponentData.y = data.y;
    opponentData.facing = data.facing;
    opponentData.squash = data.squash;
    opponentData.score = data.score;
    opponentData.cameraY = data.cameraY;
    opponentData.shooting = data.shooting;
    opponentData.backflipping = data.backflipping;
    opponentData.backflipAngle = data.backflipAngle;
    opponentData.stunned = data.stunned;
    opponentData.stunnedTime = data.stunnedTime;
    opponentData.suckedIn = data.suckedIn;
  }
  else if(data.type === 'dead') {
    opponentDead = true;
    opponentData.dead = true;
    opponentData.score = data.score;
    if(!myDead && !finishReached) showResults();
  }
  else if(data.type === 'win') {
    opponentData.score = data.score;
    playWinSound();
    if(!finishReached && !myDead) showResults();
  }
  else if(data.type === 'pointsSync') {
    // Opponent sent their view of points — reconcile (their myPts = our opPts)
    opPoints = data.myPts;
    myPoints = data.opPts;
    // Update display if result screen is showing
    document.getElementById('resultMyScore').textContent = myPoints;
    document.getElementById('resultOpScore').textContent = opPoints;
  }
  else if(data.type === 'nextReady') {
    // Opponent clicked "Manche suivante"
    opReadyForNext = true;
    if(meReadyForNext) startNextRound();
  }
  else if(data.type === 'sound') {
    if(data.snd === 'death') playDeathSound();
    else if(data.snd === 'trap') playTrapSound();
    else if(data.snd === 'hole') playHoleSound();
    else if(data.snd === 'win') playWinSound();
    else if(data.snd === 'monsterDead') playMonsterDeadSound();
    else if(data.snd === 'soucoupe') playSoucoupeSound();
  }
  else if(data.type === 'monsterKill') {
    killedEnemies.add(data.id);
    for(const m of monsters) {
      if(m.alive && m.id === data.id) {
        m.alive = false;
        spawnParticles(m.x+m.w/2, m.y, '#42a5f5', 12);
        stopMonsterSound();
        playMonsterDeadSound();
        break;
      }
    }
  }
  else if(data.type === 'soucoupeKill') {
    killedEnemies.add(data.id);
    for(const s of soucoupes) {
      if(s.alive && s.id === data.id) {
        s.alive = false;
        spawnParticles(s.x+s.w/2, s.y+s.h/2, '#8bc34a', 15);
        stopSoucoupeSound();
        playMonsterDeadSound();
        if(beingAbducted){beingAbducted=false;abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;}
        break;
      }
    }
  }
  else if(data.type === 'pseudo') {
    opPseudo = data.pseudo;
  }
  else if(data.type === 'shoot') {
    // Opponent fired — convert to our camera space
    const camDiff = data.camY - cameraY;
    opProjectiles.push({ x:data.sx, y:data.sy - camDiff, w:6, h:10, vx:data.vx, vy:data.vy });
    playShootSound();
  }
  else if(data.type === 'ready') {
    // Both sides confirmed connection — host can now send seed
    if(isHost) {
      gameSeed = Date.now();
      sendData({ type: 'seed', seed: gameSeed });
      startCountdown();
    }
  }
  else if(data.type === 'seed') {
    gameSeed = data.seed;
    startCountdown();
  }
  else if(data.type === 'restart') {
    gameSeed = data.seed;
    startCountdown();
  }
}

function showScreen(id) {
  ['lobbyScreen','waitingScreen','getReadyScreen','goScreen','resultScreen'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.add('hidden');
    el.classList.remove('visible');
  });
  if(id) document.getElementById(id).classList.remove('hidden');
}

function startSearch() {
  initAudio();
  tryEnableGyro(); // Must be called from user gesture for iOS permission
  myPseudo = document.getElementById('pseudoInput').value.trim() || 'Joueur';
  document.getElementById('lobbyStatus').textContent = 'Connexion...';
  document.getElementById('btnSearch').disabled = true;
  connected = false;
  showScreen('waitingScreen');
  tryMatchmaking();
}

function tryMatchmaking() {
  // Strategy: try to JOIN each room 0..NUM_ROOMS-1 in parallel.
  // If none respond in 4 seconds, HOST a random room and wait.
  // This ensures: first player hosts, second player joins.

  const myId = LOBBY_PREFIX + 'p-' + Math.random().toString(36).substr(2, 8);
  peer = new Peer(myId);

  peer.on('error', (err) => {
    console.warn('Peer error:', err);
    if(err.type === 'peer-unavailable') return; // expected when probing rooms
  });

  peer.on('open', () => {
    console.log('My peer ID:', peer.id);
    // Phase 1: Try to join existing rooms
    let joined = false;
    let attempts = 0;

    for(let i = 0; i < NUM_ROOMS; i++) {
      const roomId = LOBBY_PREFIX + 'room-' + i;
      const c = peer.connect(roomId, { reliable: true });

      c.on('open', () => {
        if(joined || connected) { try{c.close();}catch(e){} return; }
        joined = true;
        connected = true;
        conn = c;
        isHost = false;
        console.log('Joined room:', roomId);
        onConnected();
      });

      c.on('error', () => { /* ignore, room doesn't exist */ });

      // Close failed connections after timeout
      setTimeout(() => {
        if(!joined && c.open) { try{c.close();}catch(e){} }
      }, 3500);
    }

    // Phase 2: If no room found after 4s, become host
    setTimeout(() => {
      if(joined || connected) return;
      becomeHost();
    }, 4000);
  });
}

function becomeHost() {
  if(connected) return;
  // Pick a random room ID to host
  const roomIndex = Math.floor(Math.random() * NUM_ROOMS);
  const roomId = LOBBY_PREFIX + 'room-' + roomIndex;

  // Destroy old peer, create one with the room ID
  peer.destroy();
  peer = new Peer(roomId);

  peer.on('open', () => {
    console.log('Hosting room:', roomId);
  });

  peer.on('connection', (c) => {
    if(connected) { try{c.close();}catch(e){} return; }
    connected = true;
    conn = c;
    isHost = true;
    console.log('Player joined my room');

    conn.on('open', () => {
      onConnected();
    });
    // Sometimes 'open' already fired before we listen
    if(conn.open) onConnected();
  });

  peer.on('error', (err) => {
    console.warn('Host error:', err);
    if(err.type === 'unavailable-id') {
      // Room taken by stale peer, try another
      setTimeout(() => {
        if(connected) return;
        peer.destroy();
        becomeHost();
      }, 1500);
    }
  });
}

function onConnected() {
  console.log('Connected! isHost:', isHost);
  conn.on('data', onData);
  conn.on('close', () => {
    if(matchActive && !myDead) {
      opponentDead = true;
      opponentData.dead = true;
      showResults();
    }
  });

  // Exchange pseudos
  sendData({ type: 'pseudo', pseudo: myPseudo });

  // Both sides send 'ready' — host waits for joiner's ready before sending seed
  // Small delay to ensure both listeners are set up
  setTimeout(() => {
    sendData({ type: 'ready' });
    // If we're the joiner, the host will receive our ready and start countdown
    // If we're the host, we wait for joiner's ready (handled in onData)
  }, 500);
}

async function startCountdown() {
  showScreen('getReadyScreen');
  await sleep(5000);
  // Go!! + start match simultaneously
  showScreen('goScreen');
  playStartSound();
  startMatch();
  // Hide Go screen after 1 second
  await sleep(1000);
  showScreen(null);
}

function startMatch() {
  initAudio();
  tryEnableGyro();
  seedRandom(gameSeed);
  matchActive = true;
  opponentDead = false;
  myDead = false;
  finishReached = false;
  opponentData = { x:W/2, y:H-140, w:PLAYER_W, h:PLAYER_H, facing:1, squash:1, score:0, cameraY:0, dead:false, shooting:false, backflipping:false, backflipAngle:0, stunned:false, stunnedTime:0, suckedIn:false, pts:opPoints };
  init();
  running = true;
  dead = false;
  lastTs = 0;
  hud.textContent = '0';
  hudRight.textContent = '';
  hudLeft.textContent = myPoints + ' - ' + opPoints;
  requestAnimationFrame(loop);
}

function showResults() {
  if(!running && dead && matchActive === false) return; // already shown
  running = false;
  matchActive = false;

  let won;
  if(finishReached) won = true;
  else if(myDead) won = false;
  else if(opponentDead) won = true;
  else won = Math.floor(score) >= Math.floor(opponentData.score);

  // Award point to the winner
  if(won) myPoints++;
  else opPoints++;

  // Send updated points to opponent
  sendData({ type:'pointsSync', myPts: myPoints, opPts: opPoints });

  const titleEl = document.getElementById('resultTitle');
  // Check if someone reached MAX_POINTS
  const matchOver = myPoints >= MAX_POINTS || opPoints >= MAX_POINTS;
  if(matchOver) {
    if(myPoints >= MAX_POINTS) {
      titleEl.textContent = '🏆 Victoire finale !';
      titleEl.className = 'result-title win';
    } else {
      titleEl.textContent = '💀 Défaite finale...';
      titleEl.className = 'result-title lose';
    }
  } else {
    titleEl.textContent = won ? 'Vous gagnez la manche !' : 'Vous avez perdu la manche !';
    titleEl.className = 'result-title ' + (won ? 'win' : 'lose');
  }

  document.getElementById('resultMyName').textContent = myPseudo;
  document.getElementById('resultMyScore').textContent = myPoints;
  document.getElementById('resultOpName').textContent = opPseudo;
  document.getElementById('resultOpScore').textContent = opPoints;

  // Change button text if match is over
  document.getElementById('btnPlayAgain').textContent = matchOver ? 'Nouvelle partie' : 'Manche suivante';

  const rs = document.getElementById('resultScreen');
  ['lobbyScreen','waitingScreen','getReadyScreen','goScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
  rs.classList.remove('hidden');
  rs.offsetHeight;
  rs.classList.add('visible');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

window.addEventListener('keydown', e => {

});

canvas.addEventListener('mousedown', e => {
  if(!running||stunned||suckedIn||dead) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  fireProjectile(mx,my);
});

// ── Mobile controls ──
let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let gyroEnabled = false;
let gyroGamma = 0;
let sensorsListening = false;
let moveTouchId = null;

function tryEnableGyro() {
  if(!isMobile) return;
  // iOS requires permission from user gesture
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if(r === 'granted' && !sensorsListening) listenSensors();
    }).catch(()=>{});
    return;
  }
  // Android / other — just start listening (idempotent)
  if(!sensorsListening) listenSensors();
}

function listenSensors() {
  if(sensorsListening) return;
  sensorsListening = true;
  let source = '';

  // Classic deviceorientation
  window.addEventListener('deviceorientation', e => {
    if(e.gamma === null) return;
    gyroEnabled = true; source = 'orientation';
    const orient = screen.orientation ? screen.orientation.angle : (window.orientation || 0);
    if(orient === 90) gyroGamma = -e.beta;
    else if(orient === -90 || orient === 270) gyroGamma = e.beta;
    else gyroGamma = e.gamma;
  });

  // Accelerometer API fallback
  setTimeout(() => {
    if(source) return;
    try {
      if('Accelerometer' in window) {
        const accel = new Accelerometer({frequency: 30});
        accel.addEventListener('reading', () => {
          if(source === 'orientation') return;
          gyroEnabled = true; source = 'accel';
          gyroGamma = (accel.x / 9.8) * 45;
        });
        accel.start();
      }
    } catch(e) {}
  }, 500);

  // devicemotion fallback
  setTimeout(() => {
    if(source) return;
    window.addEventListener('devicemotion', e => {
      if(source === 'orientation' || source === 'accel') return;
      const acc = e.accelerationIncludingGravity;
      if(!acc || acc.x === null) return;
      gyroEnabled = true; source = 'motion';
      gyroGamma = -(acc.x / 9.8) * 45;
    });
  }, 1500);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  tryEnableGyro();
  if(!running||stunned||suckedIn||dead) return;

  if(isMobile && gyroEnabled) {
    // Gyro mode: all touches = shoot
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      const rect=canvas.getBoundingClientRect();
      const tx=(t.clientX-rect.left)*(W/rect.width);
      const ty=(t.clientY-rect.top)*(H/rect.height);
      fireProjectile(tx,ty);
    }
    return;
  }

  if(isMobile && !gyroEnabled) {
    // No gyro: left 30%=move left, right 30%=move right, center=shoot
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      const rect=canvas.getBoundingClientRect();
      const relX=(t.clientX-rect.left)/rect.width;
      if(relX<0.30){moveTouchId=t.identifier;keys.l=true;keys.r=false;}
      else if(relX>0.70){moveTouchId=t.identifier;keys.r=true;keys.l=false;}
      else{const tx=(t.clientX-rect.left)*(W/rect.width);const ty=(t.clientY-rect.top)*(H/rect.height);fireProjectile(tx,ty);}
    }
    return;
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===moveTouchId){moveTouchId=null;keys.l=false;keys.r=false;}
  }
}, {passive:false});

canvas.addEventListener('touchcancel', e => {
  moveTouchId=null;keys.l=false;keys.r=false;
}, {passive:false});

// Gyro will be enabled on first user gesture (button click or touch)

function fireProjectile(targetX,targetY) {
  const startX=player.x+player.w/2, startY=player.y;
  let dx=targetX-startX, dy=targetY-startY;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len<1){dx=0;dy=-1;}else{dx/=len;dy/=len;}
  if(dy>0.1) dy=-0.05;
  const len2=Math.sqrt(dx*dx+dy*dy);dx/=len2;dy/=len2;
  const spd=16;
  projectiles.push({x:startX-4,y:startY-6,w:8,h:12,vx:dx*spd,vy:dy*spd});
  shooting=true;shootTimer=0;
  if(dx<-0.1)player.facing=-1;else if(dx>0.1)player.facing=1;
  playShootSound();
  // Send shoot to opponent
  sendData({ type:'shoot', sx:startX-4, sy:startY-6, vx:dx*spd, vy:dy*spd, camY:cameraY });
}

document.getElementById('btnSearch').addEventListener('click', startSearch);
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  tryEnableGyro();
  if(myPoints >= MAX_POINTS || opPoints >= MAX_POINTS) {
    myPoints = 0; opPoints = 0;
  }
  meReadyForNext = true;
  sendData({ type:'nextReady' });
  document.getElementById('btnPlayAgain').textContent = 'En attente...';
  document.getElementById('btnPlayAgain').disabled = true;
  if(opReadyForNext) startNextRound();
});

function startNextRound() {
  meReadyForNext = false; opReadyForNext = false;
  document.getElementById('btnPlayAgain').disabled = false;
  if(conn && conn.open) {
    if(isHost) {
      gameSeed = Date.now();
      sendData({ type:'restart', seed: gameSeed });
      startCountdown();
    }
    // Joiner: startCountdown will be called when 'restart' event is received with seed
  } else {
    showScreen('lobbyScreen');
  }
}

  if(conn) try{conn.close();}catch(e){}
  if(peer) try{peer.destroy();}catch(e){}
  location.href = 'index.html';
});
